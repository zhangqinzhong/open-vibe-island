name: Harness

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'
      - 'refactor/**'
      - 'chore/**'
      - 'investigate/**'

jobs:
  harness:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Run Harness Baseline
        run: zsh scripts/harness.sh ci
